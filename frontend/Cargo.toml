[package]
name = "artbabo_frontend"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = "0.14"
bevy_egui = { version="0.28", default-features = false, features=["default_fonts", "render"]}
bevy_http_client = "0.6"
serde = "1.0"

[profile.dev.package."*"]
opt-level = 2

[workspace]
resolver = "2"
